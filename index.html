<!DOCTYPE html>
<html>
<head>
<title>Pencarian Situs</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#111;
color:white;
}

.box{
margin-top:20px;
}

input{
padding:12px;
width:250px;
border-radius:5px;
border:none;
}

button{
padding:12px 20px;
border:none;
background:red;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff3333;
}

.info{
margin-top:40px;
font-size:14px;
color:#ccc;
}
</style>
</head>

<body>

<h2>Pencarian Situs</h2>

<p>1. Masukkan nama situs yang Anda inginkan</p>
<p>2. Klik tombol <b>"CARI"</b></p>

<div class="box">
<input type="text" id="search" placeholder="Masukkan nama situs...">
<button onclick="cari()">CARI</button>
</div>

<div class="info">
<p><b>Lindungi lalu lintas Online Anda</b></p>
<p>Bebas Kendala dimana & kapan saja</p>
</div>

<script>

function cari(){

var keyword = document.getElementById("search").value.toLowerCase();

if(keyword == "sirenbola"){
window.location.href = "https://sirenbola.com";
}

else{
alert("Situs tidak ditemukan");
}

}

</script>

</body>
</html>
