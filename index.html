<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pencarian Situs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
text-align:center;
margin-top:70px;
color:white;

/* NAVY DARK FULL */
background:linear-gradient(135deg,#020617,#020617,#06152e,#0a1f44);

overflow:hidden;
}

/* BOX */
.container{
background:rgba(0,0,0,0.65);
display:inline-block;
padding:40px;
border-radius:18px;

/* GOLD + SOFT BLUE GLOW */
box-shadow: 
0 0 20px rgba(255,215,0,0.25),
0 0 40px rgba(0,80,200,0.25);
}

/* LOGO */
.logo-wrap{
position:relative;
display:inline-block;
overflow:hidden;
}

.logo{
width:220px;
}

/* EFEK KILAU GOLD */
.logo-wrap:after{
content:"";
position:absolute;
top:0;
left:-80%;
width:50%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,215,0,0.8),
transparent
);
transform:skewX(-25deg);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-80%;}
100%{left:130%;}
}

/* INPUT */
input{
padding:12px;
width:250px;
border-radius:8px;
border:none;
outline:none;

background:#020617;
color:white;

box-shadow:0 0 10px rgba(255,215,0,0.2);
}

/* ========================= */
/* BUTTON GOLD PREMIUM */
/* ========================= */

button{
position:relative;
padding:12px 22px;
border:none;

/* GOLD GRADIENT */
background:linear-gradient(45deg,#d4af37,#ffd700,#fff3a0);
color:#111;
font-weight:bold;

border-radius:8px;
cursor:pointer;
overflow:hidden;

box-shadow:0 0 15px rgba(255,215,0,0.6);
transition:0.3s;
}

/* TEXT */
button span{
position:relative;
z-index:2;
}

/* CAHAYA JALAN */
button::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.9),
transparent
);
transform:skewX(-25deg);
}

/* ANIMASI */
button:hover::before{
animation:shineBtn 0.8s forwards;
}

@keyframes shineBtn{
0%{left:-100%;}
100%{left:130%;}
}

/* HOVER */
button:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,215,0,1);
}

/* TEXT */
.info{
margin-top:30px;
color:#ccc;
font-size:14px;
}

h2{
background:linear-gradient(45deg,#fff,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
<img src="https://media.fastchecker.us/idnsmedia/is/assets/themes/aadrgq/img/logo-big.png?v=1" class="logo">
</div>

<h2>Pencarian Situs</h2>

<p>1. Masukkan nama situs</p>
<p>2. Klik tombol <b>CARI</b></p>

<br>

<input type="text" id="search" placeholder="Masukkan nama situs...">

<button onclick="_0x12()"><span>CARI</span></button>

<div class="info">
<p><b>Lindungi lalu lintas Online Anda</b></p>
<p>Bebas Kendala dimana & kapan saja</p>
</div>

</div>

<script>

function _0x12(){
var _0x1=document.getElementById("search").value.toLowerCase();
if(_0x1=="sirenbola"){
window.location.href="https://sirenbola.com";
}else{
alert("Situs tidak ditemukan");
}
}

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

document.onkeydown=function(e){

if(e.keyCode==123){ return false; }

if(e.ctrlKey && e.shiftKey && e.keyCode==73){ return false; }

if(e.ctrlKey && e.keyCode==85){ return false; }

};

</script>

</body>
</html>
