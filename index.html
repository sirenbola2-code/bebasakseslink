<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pencarian Situs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:linear-gradient(135deg,#06152e,#0a3d91,#1b6cff);
overflow-x:hidden;
padding:20px;
}

/* BOX */
.container{
background:rgba(0,0,0,0.55);
padding:35px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,140,255,0.7);
text-align:center;
width:100%;
max-width:420px;
}

/* LOGO */
.logo-wrap{
position:relative;
display:inline-block;
overflow:hidden;
}

.logo{
width:180px;
max-width:100%;
}

/* SHINE */
.logo-wrap:after{
content:"";
position:absolute;
top:0;
left:-80%;
width:50%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.9),transparent);
transform:skewX(-25deg);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-80%;}
100%{left:130%;}
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:6px;
border:none;
outline:none;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#1da1ff;
color:white;
border-radius:6px;
cursor:pointer;
box-shadow:0 0 10px #1da1ff;
font-size:14px;
}

button:hover{
background:#4db8ff;
box-shadow:0 0 20px #4db8ff;
}

.info{
margin-top:20px;
color:#ddd;
font-size:13px;
line-height:1.5;
}

/* LIVECHAT */
.livechat{
position:fixed;
right:20px;
bottom:20px;
background:#1da1ff;
color:white;
padding:12px 16px;
border-radius:50px;
font-size:14px;
text-decoration:none;
box-shadow:0 0 15px rgba(0,140,255,0.8);
transition:0.3s;
z-index:999;
white-space:nowrap;
}

.livechat:hover{
transform:scale(1.05);
background:#4db8ff;
}

/* RESPONSIVE MOBILE */
@media (max-width:480px){

.container{
padding:25px;
}

.logo{
width:150px;
}

.livechat{
right:15px;
bottom:15px;
padding:10px 14px;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
<img src="https://media.fastchecker.us/idnsmedia/is/assets/themes/aadrgq/img/logo-big.png?v=1" class="logo">
</div>

<p>Masukkan nama situs lalu klik cari</p>

<div class="info">
<b>Lindungi lalu lintas Online Anda</b><br>
Bebas Kendala dimana & kapan saja
</div>

</div>

<!-- LIVECHAT -->
<a href="https://direct.lc.chat/12786534/" target="_blank" class="livechat">
💬 Live Chat
</a>

</body>
</html>
