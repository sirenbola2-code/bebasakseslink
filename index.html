<!DOCTYPE html>
<html>
<head>
<title>Pencarian Situs</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:80px;
    background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
    color:white;
}

/* CONTAINER */
.container{
    background:#161616;
    display:inline-block;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 25px rgba(255,0,0,0.4);
}

/* LOGO WRAP */
.logo-wrap{
    position:relative;
    display:inline-block;
    overflow:hidden;
}

/* LOGO */
.logo{
    width:220px;
}

/* SHINE EFFECT */
.logo-wrap::after{
    content:"";
    position:absolute;
    top:0;
    left:-75%;
    width:50%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.8),
        transparent
    );
    transform:skewX(-25deg);
    animation: shine 3s infinite;
}

@keyframes shine{
    0%{
        left:-75%;
    }
    100%{
        left:125%;
    }
}

/* INPUT */
input{
    padding:12px;
    width:260px;
    border-radius:6px;
    border:none;
    outline:none;
    font-size:14px;
}

/* BUTTON */
button{
    padding:12px 22px;
    border:none;
    background:red;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ff3333;
}

.info{
    margin-top:40px;
    font-size:14px;
    color:#ccc;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
<img src="https://www.sirenbola8.com/assets/logo-sirenbola.png" class="logo">
</div>

<h2>Pencarian Situs</h2>

<p>1. Masukkan nama situs yang Anda inginkan</p>
<p>2. Klik tombol <b>"CARI"</b></p>

<div>
<input type="text" id="search" placeholder="Masukkan nama situs...">
<button onclick="cari()">CARI</button>
</div>

<div class="info">
<p><b>Lindungi lalu lintas Online Anda</b></p>
<p>Bebas Kendala dimana & kapan saja</p>
</div>

</div>

<script>

function cari(){
var keyword = document.getElementById("search").value.toLowerCase();

if(keyword == "sirenbola"){
window.location.href = "https://sirenbola.com";
}
else{
alert("Situs tidak ditemukan");
}

}

</script>

</body>
</html>
